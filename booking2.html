<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sphere Ultra Cinema Booking</title>

<style>

body{
background:#070b18;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
margin-top:20px;
}

.screen{
width:450px;
height:80px;
margin:20px auto;
background:white;
color:black;
border-radius:50%/100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.time-container{
display:flex;
justify-content:center;
gap:15px;
margin:20px;
flex-wrap:wrap;
}

.time-btn{
background:#111;
color:white;
border:2px solid #00e5ff;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-size:15px;
}

.time-btn:hover{
background:#00e5ff;
color:black;
}

.time-btn.active{
background:#00e5ff;
color:black;
}

.container{
position:relative;
width:950px;
height:520px;
margin:auto;
}

.seat{
width:28px;
height:28px;
position:absolute;
border-radius:6px;
cursor:pointer;
font-size:9px;
line-height:28px;
text-align:center;
}

.silver{background:#2ecc71}
.gold{background:#3498db}
.vip{background:#9b59b6}

.selected{background:#f1c40f}

.booked{
background:#e74c3c;
cursor:not-allowed;
}

.legend{
margin-top:20px;
}

.box{
width:18px;
height:18px;
display:inline-block;
margin-right:5px;
}

.summary{
margin-top:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 30px;
background:#ff4757;
border:none;
color:white;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e84118;
}

</style>
</head>

<body>

<h1>Sphere Ultra Cinema Booking</h1>

<div class="screen">SCREEN 2</div>

<h2>Select Show Time</h2>

<div class="time-container">
<button class="time-btn">11:30 PM</button>
<button class="time-btn">3:30 PM</button>
<button class="time-btn">7:30 PM</button>
</div>

<div class="container" id="seats"></div>

<div class="legend">
<span class="box" style="background:#2ecc71"></span>Silver ₹120
<span class="box" style="background:#3498db"></span>Gold ₹180
<span class="box" style="background:#9b59b6"></span>VIP ₹250
<span class="box" style="background:#f1c40f"></span>Selected
<span class="box" style="background:#e74c3c"></span>Booked
</div>

<div class="summary">
Seats: <span id="seatList">None</span><br>
Total Seats: <span id="count">0</span><br>
Total Price: ₹<span id="price">0</span>
</div>

<button onclick="confirmBooking()">Confirm Booking</button>

<script>

const rows=[
{row:"A", seats:15, radius:120, type:"silver"},
{row:"B", seats:18, radius:150, type:"silver"},
{row:"C", seats:20, radius:180, type:"gold"},
{row:"D", seats:22, radius:210, type:"gold"},
{row:"E", seats:25, radius:240, type:"vip"},
{row:"F", seats:25, radius:270, type:"vip"},
{row:"G", seats:25, radius:300, type:"vip"}
];

const price={
silver:120,
gold:180,
vip:250
};

const container=document.getElementById("seats");

const centerX=475;
const centerY=0;

let selectedSeats=[];
let totalPrice=0;

rows.forEach(r=>{

for(let i=0;i<r.seats;i++){

let angle=(i/(r.seats-1))*Math.PI;

let x=centerX+r.radius*Math.cos(angle)-14;
let y=centerY+r.radius*Math.sin(angle);

let seat=document.createElement("div");

seat.className="seat "+r.type;

seat.innerText=r.row+(i+1);

seat.style.left=x+"px";
seat.style.top=y+"px";

if(Math.random()<0.07){
seat.classList.add("booked");
}

seat.onclick=function(){

if(seat.classList.contains("booked")) return;

seat.classList.toggle("selected");

let seatNum=seat.innerText;

if(seat.classList.contains("selected")){
selectedSeats.push(seatNum);
totalPrice+=price[r.type];
}else{
selectedSeats=selectedSeats.filter(s=>s!==seatNum);
totalPrice-=price[r.type];
}

updateSummary();

}

container.appendChild(seat);

}

});

function updateSummary(){

document.getElementById("seatList").innerText=
selectedSeats.length?selectedSeats.join(", "):"None";

document.getElementById("count").innerText=selectedSeats.length;

document.getElementById("price").innerText=totalPrice;

}

function confirmBooking(){

if(selectedSeats.length===0){
alert("Please select seats");
return;
}

let selectedTime=document.querySelector(".time-btn.active");

if(!selectedTime){
alert("Please select show time");
return;
}

let time=selectedTime.innerText;

localStorage.setItem("time",time);
localStorage.setItem("seats",selectedSeats.join(", "));
localStorage.setItem("price",totalPrice);

window.location.href="payment.html";

}

let timeButtons=document.querySelectorAll(".time-btn");

timeButtons.forEach(btn=>{
btn.addEventListener("click",function(){

timeButtons.forEach(b=>b.classList.remove("active"));

this.classList.add("active");

});
});

</script>

</body>
</html>
